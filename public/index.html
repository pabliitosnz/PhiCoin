<!DOCTYPE html>
<html>
<head>
  <title>PhiCoin</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    input, button { margin: 5px 0; padding: 10px; width: 100%; }
    .box { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }

    #topbar {
      display: none;
      justify-content: space-between;
      background: #111;
      color: white;
      padding: 10px;
    }
  </style>
</head>
<body>

<div id="topbar">
  <div id="userInfo"></div>
  <button onclick="logout()">Logout</button>
</div>

<h1>🔥 PhiCoin</h1>

<!-- REGISTER -->
<div id="authBox">

  <div class="box">
    <h3>Register</h3>
    <input id="regUser" placeholder="username">
    <input id="regPass" placeholder="password">
    <button onclick="register()">Create account</button>
  </div>

  <div class="box">
    <h3>Login</h3>
    <input id="logUser" placeholder="username">
    <input id="logPass" placeholder="password">
    <button onclick="login()">Login</button>
  </div>

</div>

<!-- APP -->
<div id="appBox" style="display:none;">

  <div class="box">
    <h3>Send money</h3>
    <input id="to" placeholder="to user">
    <input id="amount" placeholder="amount">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
async function register() {
  await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });

  alert("Account created");
}

async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Login failed");
    return;
  }

  await loadMe();
}

async function loadMe() {
  const res = await fetch('/me');
  const data = await res.json();

  if (!data.logged) return;

  document.getElementById("topbar").style.display = "flex";
  document.getElementById("userInfo").innerText =
    data.username + " | 💰 " + data.balance;

  document.getElementById("authBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
}

async function logout() {
  await fetch('/logout', { method: 'POST' });
  location.reload();
}

async function send() {
  await fetch('/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      to: to.value,
      amount: Number(amount.value)
    })
  });

  alert("Sent");
  loadMe();
}

loadMe();
</script>

</body>
</html>
