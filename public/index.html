<!DOCTYPE html>
<html>
<head>
  <title>PhiCoin</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    input, button { margin: 5px 0; padding: 10px; width: 100%; }
    .box { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h1>🔥 PhiCoin</h1>

<div class="box">
  <h3>Register</h3>
  <input id="regUser" placeholder="username">
  <button onclick="register()">Create user</button>
</div>

<div class="box">
  <h3>Send money</h3>
  <input id="from" placeholder="from">
  <input id="to" placeholder="to">
  <input id="amount" placeholder="amount">
  <button onclick="send()">Send</button>
</div>

<div class="box">
  <h3>Users</h3>
  <button onclick="loadUsers()">Load users</button>
  <pre id="users"></pre>
</div>

<div class="box">
  <h3>History</h3>
  <button onclick="loadHistory()">Load history</button>
  <pre id="history"></pre>
</div>

<div class="box">
  <h3>Login</h3>
  <input id="logUser" placeholder="username">
  <input id="logPass" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<script>
async function register() {
  await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username: regUser.value })
  });
  alert("User created");
}

async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Login failed");
  } else {
    alert("Logged in as " + data.username);
    loadMe();
  }
}

async function loadMe() {
  const res = await fetch('/me');
  const data = await res.json();
  alert("Balance: " + data.balance);
}

async function send() {
  await fetch('/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      from: from.value,
      to: to.value,
      amount: Number(amount.value)
    })
  });
  alert("Sent");
}

async function loadUsers() {
  const res = await fetch('/users');
  users.innerText = JSON.stringify(await res.json(), null, 2);
}

async function loadHistory() {
  const res = await fetch('/history');
  history.innerText = JSON.stringify(await res.json(), null, 2);
}

</script>

</body>
</html>
